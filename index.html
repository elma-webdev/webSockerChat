<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Chat WebSocket</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --surface: rgba(15, 23, 42, 0.95);
        --surface-strong: rgba(30, 41, 59, 0.98);
        --border: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --primary: #6366f1;
        --primary-soft: rgba(99, 102, 241, 0.18);
        --accent: #38bdf8;
        --shadow: 0 30px 80px rgba(15, 23, 42, 0.3);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--text);
        /* background:
          radial-gradient(
            circle at top,
            rgba(56, 189, 248, 0.15),
            transparent 28%
          ),
          linear-gradient(180deg, #020617 0%, #111827 100%); */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 30px;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(99, 102, 241, 0.18),
            transparent 22%
          ),
          radial-gradient(
            circle at 85% 10%,
            rgba(56, 189, 248, 0.12),
            transparent 18%
          );
        pointer-events: none;
        z-index: -1;
      }

      h2 {
        margin: 0 0 22px;
        font-size: clamp(1.8rem, 2.2vw, 2.6rem);
        letter-spacing: -0.03em;
        text-align: center;
        color: #f8fafc;
        text-shadow: 0 6px 20px rgba(15, 23, 42, 0.45);
      }

      #chat {
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: min(100%, 580px);
        max-height: 460px;
        padding: 20px;
        border-radius: 32px;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        overflow-y: auto;
        backdrop-filter: blur(18px);
      }

      #chat::-webkit-scrollbar {
        width: 10px;
      }
      #chat::-webkit-scrollbar-track {
        background: transparent;
      }
      #chat::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.28);
        border-radius: 999px;
      }

      .mensagem {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 80%;
        padding: 16px 18px;
        border-radius: 24px;
        line-height: 1.6;
        background: rgba(30, 41, 59, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.12);
        box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.04);
        color: var(--text);
        word-break: break-word;
        align-self: flex-start;
      }

      .mensagem.user {
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.22),
          rgba(56, 189, 248, 0.12)
        );
        border-color: rgba(56, 189, 248, 0.25);
        color: #eff6ff;
        align-self: flex-end;
      }

      .texto {
        font-size: 1rem;
      }

      .timestamp {
        font-size: 0.78rem;
        color: var(--muted);
        align-self: flex-end;
      }

      .inputDiv {
        display: flex;
        align-items: center;
        gap: 12px;
        width: min(100%, 580px);
        padding: 14px;
        margin-top: 18px;
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.14);
        box-shadow: 0 25px 50px rgba(15, 23, 42, 0.16);
      }

      input {
        flex: 1;
        min-width: 0;
        border: none;
        outline: none;
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.6);
        color: var(--text);
        font-size: 1rem;
        transition: background-color 0.2s ease;
      }

      input::placeholder {
        color: rgba(226, 232, 240, 0.55);
      }

      input:focus {
        background: rgba(15, 23, 42, 0.9);
      }

      button {
        flex-shrink: 0;
        min-width: 110px;
        border: none;
        border-radius: 18px;
        padding: 14px 22px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          opacity 0.2s ease;
        box-shadow: 0 14px 30px rgba(56, 189, 248, 0.18);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 38px rgba(56, 189, 248, 0.22);
      }

      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <h2>Chat with me</h2>

    <div id="chat"></div>

    <div class="inputDiv">
      <input type="text" id="msgInput" placeholder="Digite sua mensagem..." />
      <button onclick="enviar()">Enviar</button>
    </div>

    <script>
      const chatDiv = document.getElementById("chat");
      const input = document.getElementById("msgInput");
      /*   Conecta ao nosso servidor Node.js */
      // Substitui a linha antiga por esta:
const socket = new WebSocket("wss://websocket-fgn7.onrender.com");
      let meuId = null;

      socket.onopen = () => {
        console.log("Conectado ao servidor WebSocket");
      };

      /*   Escuta mensagens vindas do servidor */
      socket.onmessage = (event) => {
        const object = JSON.parse(event.data);

        if (object.type === "SYSTEM") {
          meuId = object.id;
          console.log("O meu ID fixo é:", meuId);
          return;
        }
        const novaMensagem = document.createElement("div");
        novaMensagem.className = "mensagem";
        novaMensagem.innerHTML = `
            <div class="texto">${object.message}</div>
            <span class="timestamp">${object.timestamp.slice(11, 16)}</span>
        `;
        chatDiv.appendChild(novaMensagem); // Rola o chat para baixo
        chatDiv.scrollTop = chatDiv.scrollHeight;

        if (object.type === "USER" && object.id === meuId) {
          novaMensagem.style.backgroundColor = "blue";
          novaMensagem.style.alignSelf = "flex-end";
        }
      };

      function enviar() {
        const mensagem = input.value;
        if (mensagem) {
          socket.send(mensagem); // Envia para o servidor
          input.value = "";
        }
      }

      /*    Permite enviar com a tecla Enter */
      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") enviar();
      });
    </script>
  </body>
</html>
